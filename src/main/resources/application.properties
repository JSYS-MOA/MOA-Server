# JPA 설정 (MySQL용 방언으로 변경)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
#Supabase에 맞게 sql 자동 변경 배포용
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#401 CJFL
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true

#logging 레벨 처리 TRACE < DEBUG < INFO < WARN < ERROR
logging.level.root=INFO
logging.level.com.moa.server=INFO

#파일 업로드
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
file.upload-dir=${user.home}/moa_uploads

#테이블이 없으면 생성, 있으면 변경된 부분만 반영
spring.jpa.hibernate.ddl-auto=update

# 실제로 실행되는 SQL을 콘솔에서 확인 (디버깅용)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 쿼리에 ??? 뜨는데 그거 표기 해주는거
logging.level.org.hibernate.orm.jdbc.bind=trace

# 커넥션 풀 설정 (HikariCP는 스프링 부트 기본값입니다)
# 연결 시도 타임아웃 (ms)
spring.datasource.hikari.connection-timeout=30000
# 연결 유지 최대 시간
spring.datasource.hikari.maximum-pool-size=10